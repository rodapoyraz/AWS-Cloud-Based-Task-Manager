<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Task Manager{% endblock %}</title>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% if current_user.is_authenticated %}{{ url_for('routes.ui_tasks') }}{% else %}{{ url_for('routes.login') }}{% endif %}">
          Task Manager
        </a>
    
        <div class="ms-auto d-flex gap-2">
          {% if current_user.is_authenticated %}
            <a class="btn btn-sm btn-outline-light" href="{{ url_for('routes.ui_new_task') }}">New</a>
            <form method="post" action="{{ url_for('routes.logout') }}">
              <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
          {% else %}
            <a class="btn btn-sm btn-outline-light" href="{{ url_for('routes.login') }}">Login</a>
            <a class="btn btn-sm btn-light" href="{{ url_for('routes.register') }}">Register</a>
          {% endif %}
        </div>
      </div>
    </nav>
    

    <div class="container my-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }} mb-3">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
