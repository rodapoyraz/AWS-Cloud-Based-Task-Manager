{% extends "base.html" %}
{% block title %}Assign Task{% endblock %}

{% block content %}
<h1 class="h4 mb-3">Assign Task</h1>

<form method="post" class="card p-3" style="max-width:520px;">
  <div class="mb-3">
    <label class="form-label">Select user</label>
    <select name="assignee_id" class="form-select" required>
      <option value="">-- Choose user --</option>
      {% for u in users %}
        <option value="{{ u.id }}">
          {{ u.id }}
        </option>
      {% endfor %}
    </select>
    <div class="form-text">
      Only user ID is shown. Email is hidden internally.
    </div>
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Assign</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('routes.ui_tasks') }}">Cancel</a>
  </div>
</form>
{% endblock %}
