name: Deploy Flask app to Azure App Service

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 1) Install dependencies INTO the folder that will be deployed
      - name: Install dependencies into .python_packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      # 2) Smoke test using that folder
      - name: Smoke test (import wsgi)
        run: |
          PYTHONPATH=".python_packages/lib/site-packages" python -c "from wsgi import app; print('WSGI import OK')"

      # 3) Deploy AFTER the folder exists
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rodapoyraz-taskmanager
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
